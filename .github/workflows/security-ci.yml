name: Security CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  app-security-checks:
    name: App lint, audit and Python security checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run JavaScript lint
        run: npm run lint

      - name: Audit Node.js dependencies
        run: npm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r security-scripts/requirements.txt

      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          NODE_ENV=development
          PORT=3000
          DATABASE_PATH=./data/helpdesk-ci.sqlite
          JWT_SECRET=ci-secret-with-at-least-32-characters
          JWT_EXPIRES_IN=15m
          EOF

      - name: Run database migrations
        run: npm run db:migrate

      - name: Seed database
        run: npm run db:seed

      - name: Start API
        run: |
          npm start > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API health check
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:3000/health; then
              echo "API is healthy"
              exit 0
            fi

            echo "Waiting for API... attempt ${attempt}/30"
            sleep 1
          done

          echo "API did not become healthy"
          cat api.log
          exit 1

      - name: Run Python security checks
        env:
          SECURITY_API_BASE_URL: http://localhost:3000
          SECURITY_DATABASE_PATH: ./data/helpdesk-ci.sqlite
        run: python security-scripts/run_security_checks.py

      - name: Print API logs on failure
        if: failure()
        run: cat api.log || true

  secret-scanning:
    name: Secret scanning with Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run Gitleaks against current files
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            dir --verbose --redact .

  sast:
    name: SAST with Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run Semgrep Community Edition scan
        run: semgrep scan --config auto .

  dependency-scanning:
    name: Dependency scanning with OSV Scanner
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        --lockfile=package-lock.json
        --lockfile=requirements.txt:security-scripts/requirements.txt

  sbom:
    name: Generate CycloneDX Node.js SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Generate CycloneDX SBOM for Node.js dependencies
        run: npx @cyclonedx/cyclonedx-npm --output-format JSON --output-file artifacts/sbom-node.json

      - name: Upload Node.js SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-node
          path: artifacts/sbom-node.json
          if-no-files-found: error
          retention-days: 14